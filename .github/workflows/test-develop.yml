# GitHub Actions workflow
# This workflow includes jobs for linting, type checking, and testing the Python codebase.
# A coverage report will be uploaded as an artifact after tests run.
#
# Triggered on:
#   - PUSH to develop branch
#   - PULL REQUESTS targeting the develop branch

name: Tests

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
    types: [opened, synchronize]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          python-version: "3.13"
          working-directory: app

      - name: Install dependencies
        working-directory: app
        run: uv sync --group dev

      - name: Run Ruff linting
        working-directory: app
        run: uv run ruff check .

      - name: Run Ruff formatting check
        working-directory: app
        run: uv run ruff format --check .

      - name: Run Mypy type checking
        working-directory: app
        run: uv run mypy .

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          python-version: "3.13"
          enable-cache: true
          working-directory: app

      - name: Install dependencies
        working-directory: app
        run: uv sync --group dev

      - name: Run database migrations
        working-directory: app
        run: uv run python manage.py migrate --noinput
        env:
          DJANGO_SETTINGS_MODULE: main.settings
          SECRET_KEY: secret-key-for-ci
          DEBUG: "False"

      - name: Run pytest
        working-directory: app
        run: uv run pytest -s -v
        env:
          DJANGO_SETTINGS_MODULE: main.settings
          SECRET_KEY: secret-key-for-ci
          DEBUG: "False"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7.0.0
        if: always()
        with:
          name: coverage-reports
          path: |
            app/pytest/html/
            app/pytest/coverage.xml
