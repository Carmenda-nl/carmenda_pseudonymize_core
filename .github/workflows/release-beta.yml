# GitHub Actions workflow
# This workflow builds a pre-release when a new beta tag is pushed.
# The build artifact is uploaded to the created beta release.
# Windows based build is currently supported.
#
# Triggered on:
#   - PUSH of tags matching v*-beta

name: Beta release

on:
  push:
    tags:
      - "v*-beta"

permissions:
  contents: write
  packages: write

jobs:
  build-beta-windows:
    runs-on: windows-latest
    outputs:
      tag: ${{ github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Create .env file for build
        run: |
          @"
          DJANGO_RUNSERVER_HIDE_WARNING=true
          DEBUG=False
          LOG_LEVEL=INFO
          SECRET_KEY=${{ github.sha }}
          CSRF_TRUSTED_ORIGINS=http://127.0.0.1
          JOB_LOG_ONLY=True
          "@ | Out-File -FilePath "app\.env" -Encoding utf8
        shell: pwsh

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          working-directory: app

      - name: Install dependencies
        working-directory: app
        run: uv sync --group build

      - name: Build windows executable
        working-directory: app
        run: uv run pyinstaller ../build.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: backend-windows
          path: app/dist/backend/
          include-hidden-files: true

  create-beta-release:
    needs: build-beta-windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: backend-windows
          path: backend

      - name: Create zip archive
        run: |
          cd backend
          zip -r ../Privacytool_backend_win_${{ github.ref_name }}.zip *
          cd ..
          ls -lh *.zip

      - name: Get release notes
        id: release_notes
        uses: orhun/git-cliff-action@v4.7.1
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Create beta release
        uses: softprops/action-gh-release@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: "Beta release ${{ github.ref_name }}"
          body: ${{ steps.release_notes.outputs.content }}
          prerelease: true
          draft: false
          fail_on_unmatched_files: false
          generate_release_notes: false
          files: "*.zip"

      - name: Generate changelog entry
        uses: orhun/git-cliff-action@v4.7.1
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}
          OUTPUT: /tmp/changelog_entry.md

      - name: Update CHANGELOG.md
        run: |
          python3 << 'EOF'
          import re
          version_no_v = '${{ github.ref_name }}'.lstrip('v')
          with open('/tmp/changelog_entry.md', 'r') as f:
              new_entry = f.read().strip()
          with open('CHANGELOG.md', 'r') as f:
              content = f.read()
          pattern = r'## \[' + re.escape(version_no_v) + r'\].*?(?=\n## \[|\Z)'
          content = re.sub(pattern, '', content, flags=re.DOTALL)
          match = re.search(r'\n(## \[)', content)
          if match:
              pos = match.start() + 1
              content = content[:pos] + new_entry + '\n\n' + content[pos:]
          else:
              content = content.rstrip() + '\n\n' + new_entry + '\n'
          content = re.sub(r'\n{3,}', '\n\n', content)
          with open('CHANGELOG.md', 'w') as f:
              f.write(content)
          EOF

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore(release): update CHANGELOG.md for ${{ github.ref_name }}"
          git push origin HEAD:develop

      - name: Trigger frontend build
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.FRONTEND_TRIGGER_TOKEN }}" \
            https://api.github.com/repos/Carmenda-nl/carmenda_pseudonymize_frontend/dispatches \
            -d '{"event_type":"backend-release"}'
